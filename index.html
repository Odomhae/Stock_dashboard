<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식 공부 대시보드</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <div class="container">
    <h1>주식 공부 대시보드</h1>

    <!-- 검색 영역 -->
    <div class="search-area">
      <input
        type="text"
        id="search-input"
        placeholder="종목명 또는 심볼 입력 (예: 삼성전자, AAPL)"
        autocomplete="off"
      />
      <button id="search-btn">검색</button>
      <ul id="dropdown"></ul>
    </div>

    <!-- 기간 필터 -->
    <div class="period-area">
      <div class="preset-group">
        <button data-preset="1W">1W</button>
        <button data-preset="1M">1M</button>
        <button data-preset="3M" class="active">3M</button>
        <button data-preset="6M">6M</button>
        <button data-preset="1Y">1Y</button>
        <button data-preset="5Y">5Y</button>
      </div>
      <div class="date-group">
        <input type="date" id="from-date" />
        <span class="tilde">~</span>
        <input type="date" id="to-date" />
        <button id="apply-date">적용</button>
      </div>
    </div>

    <!-- 차트 섹션 -->
    <div class="chart-section">
      <div class="chart-header">
        <span id="chart-title">종목을 검색하세요</span>
        <div class="type-group">
          <button data-type="line" class="active">라인</button>
          <button data-type="candlestick">캔들</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart-canvas" style="display: none;"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="/scripts/main.js"></script>
</body>
</html>
